<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Gesture Display</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
    #scene { position: relative; width: 100%; height: 100%; }
    #video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 1;
    }
    #skeleton-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      z-index: 2; pointer-events: none;
    }
    .hand-overlay {
      position: absolute; z-index: 3;
      pointer-events: none;
      object-fit: contain;
      transition: opacity 0.35s ease;
    }
    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 10; padding: 12px 16px;
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(to bottom, rgba(0,0,0,.65) 0%, transparent 100%);
      pointer-events: none;
    }
    #hud-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #00d4ff; box-shadow: 0 0 8px #00d4ff;
      animation: pulse 2s infinite; flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #hud-status { font-size: 12px; color: rgba(255,255,255,.5); font-family: sans-serif; }
    #no-camera {
      position: absolute; inset: 0; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      z-index: 20; background: #0a0e1a;
      color: rgba(255,255,255,.4); font-size: 14px; gap: 12px; font-family: sans-serif;
    }
  </style>
</head>
<body>
<div id="scene">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="skeleton-canvas"></canvas>
  <div id="hud">
    <div id="hud-dot"></div>
    <div id="hud-status">初期化中...</div>
  </div>
  <div id="no-camera">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
    </svg>
    <p>カメラを初期化中...</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ================================================================
//  ★ デプロイ後にGAS WebアプリURLを設定してください
// ================================================================
const GAS_URL        = 'https://script.google.com/macros/s/AKfycbz8tcLzrvjhqeFnC7XkpbVNYDN4xshpzQ5AQaxf4KgjVldWjlGREn1-HEIQ__NaC6mO/exec';
const FETCH_INTERVAL = 5000; // スプシ再取得間隔(ms)

// ================================================================
//  グローバル状態
// ================================================================
let gestures     = [];
let showSkeleton = true;

// handIdx-gestureIdx ごとのタイマー状態
const handStates = {};

// ================================================================
//  DOM
// ================================================================
const videoEl   = document.getElementById('video');
const canvasEl  = document.getElementById('skeleton-canvas');
const ctx       = canvasEl.getContext('2d');
const hudStatus = document.getElementById('hud-status');
const noCameraEl= document.getElementById('no-camera');
const scene     = document.getElementById('scene');

function resizeCanvas() {
  canvasEl.width  = window.innerWidth;
  canvasEl.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ================================================================
//  オーバーレイ画像プール  key: "hi-gi" → <img>
// ================================================================
const overlayPool = {};

function getOrCreateOverlay(hi, gi) {
  const key = hi + '-' + gi;
  if (!overlayPool[key]) {
    const img = document.createElement('img');
    img.className = 'hand-overlay';
    img.style.opacity = '0';
    img.style.display = 'none';
    scene.appendChild(img);
    overlayPool[key] = img;
  }
  return overlayPool[key];
}

// ================================================================
//  GAS fetch
// ================================================================
async function fetchConfig() {
  if (!GAS_URL || GAS_URL === 'YOUR_GAS_WEBAPP_URL_HERE') return;
  try {
    const res  = await fetch(GAS_URL, { cache: 'no-store' });
    const data = await res.json();
    if (data.error) { console.warn('GAS error:', data.error); return; }
    applyConfig(data);
  } catch (e) {
    console.error('fetch error:', e);
    hudStatus.textContent = 'GAS接続エラー';
  }
}

function applyConfig(data) {
  showSkeleton = !!data.showSkeleton;
  canvasEl.style.display = showSkeleton ? 'block' : 'none';
  gestures = (data.gestures || []).filter(g => g.enabled);
  hudStatus.textContent = '設定取得済 (' + gestures.length + '件有効)';
}

// BroadcastChannel（admin.htmlからのリアルタイム反映）
const channel = new BroadcastChannel('hand-gesture-channel');
channel.onmessage = (e) => {
  if (e.data && e.data.type === 'config') applyConfig(e.data.payload);
};

// ================================================================
//  指の曲げ伸ばし判定
// ================================================================
const TIPS = { thumb:4, index:8,  middle:12, ring:16, pinky:20 };
const PIPS = {          index:6,  middle:10, ring:14, pinky:18 };

function isExtended(lms, finger) {
  const w = lms[0];
  if (finger === 'thumb') {
    const tip = lms[4], mcp = lms[2];
    return Math.hypot(tip.x-w.x, tip.y-w.y) > Math.hypot(mcp.x-w.x, mcp.y-w.y) * 1.15;
  }
  const tip = lms[TIPS[finger]], pip = lms[PIPS[finger]];
  return Math.hypot(tip.x-w.x, tip.y-w.y) > Math.hypot(pip.x-w.x, pip.y-w.y) * 1.05;
}

function fingerOk(lms, finger, cond) {
  if (cond === 'Ignore') return true;
  const ext = isExtended(lms, finger);
  return cond === 'Extended' ? ext : !ext;
}

function matchGesture(lms, handedness, gesture) {
  if (gesture.targetHand !== 'Both') {
    const corrected = handedness.label === 'Right' ? 'Left' : 'Right';
    if (handedness.score < 0.7) return false;
    if (corrected !== gesture.targetHand) return false;
  }
  for (const [f, cond] of Object.entries(gesture.fingers)) {
    if (!fingerOk(lms, f, cond)) return false;
  }
  return true;
}

// ================================================================
//  手のバウンディングボックス（画面座標、映像ミラーを考慮）
// ================================================================
function getHandBounds(lms) {
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  for (const lm of lms) {
    const sx = (1 - lm.x) * canvasEl.width;   // ミラー補正
    const sy = lm.y * canvasEl.height;
    if (sx < minX) minX = sx;
    if (sy < minY) minY = sy;
    if (sx > maxX) maxX = sx;
    if (sy > maxY) maxY = sy;
  }
  const cx   = (minX + maxX) / 2;
  const cy   = (minY + maxY) / 2;
  const size = Math.max((maxX - minX) * 1.7, (maxY - minY) * 1.7, 60);
  return { cx, cy, size };
}

// ================================================================
//  MediaPipe 結果コールバック
// ================================================================
function onResults(results) {
  ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);

  const handCount = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
  const activeKeys = new Set();
  const nowMs = performance.now();

  for (let hi = 0; hi < handCount; hi++) {
    const lms        = results.multiHandLandmarks[hi];
    const handedness = results.multiHandedness[hi];
    const bounds     = getHandBounds(lms);

    // 骨格描画（scaleX(-1)をCanvasで再現: 座標を反転して描画）
    if (showSkeleton) {
      // ミラー反転した座標系で描画するためctxを変換
      ctx.save();
      ctx.scale(-1, 1);
      ctx.translate(-canvasEl.width, 0);
      drawConnectors(ctx, lms, HAND_CONNECTIONS, { color: 'rgba(0,212,255,0.45)', lineWidth: 2 });
      drawLandmarks(ctx, lms, { color: '#00d4ff', fillColor: 'rgba(0,0,0,0.7)', lineWidth: 1, radius: 3 });
      ctx.restore();
    }

    // 各ジェスチャー設定とのマッチング
    for (let gi = 0; gi < gestures.length; gi++) {
      const g   = gestures[gi];
      const key = hi + '-' + gi;
      if (!handStates[key]) handStates[key] = { startTime: null };
      const state = handStates[key];
      const img   = getOrCreateOverlay(hi, gi);

      // 画像URL更新
      if (g.imageUrl && img.dataset.url !== g.imageUrl) {
        img.src = g.imageUrl;
        img.dataset.url = g.imageUrl;
      }

      if (matchGesture(lms, handedness, g)) {
        if (state.startTime === null) state.startTime = nowMs;
        if (nowMs - state.startTime >= g.duration * 1000) {
          // 条件達成 → 手の上に配置
          const half = bounds.size / 2;
          img.style.display = 'block';
          img.style.opacity = '1';
          img.style.left    = (bounds.cx - half) + 'px';
          img.style.top     = (bounds.cy - half) + 'px';
          img.style.width   = bounds.size + 'px';
          img.style.height  = bounds.size + 'px';
          activeKeys.add(key);
        }
      } else {
        state.startTime = null;
      }
    }
  }

  // 非アクティブなオーバーレイを隠す
  for (const [key, img] of Object.entries(overlayPool)) {
    if (!activeKeys.has(key)) {
      img.style.opacity = '0';
      img.style.display = 'none';
    }
  }

  // フレームから消えた手のstateリセット
  for (const key of Object.keys(handStates)) {
    const hi = parseInt(key.split('-')[0], 10);
    if (hi >= handCount) handStates[key].startTime = null;
  }
}

// ================================================================
//  MediaPipe Hands
// ================================================================
const hands = new Hands({
  locateFile: f => 'https://cdn.jsdelivr.net/npm/@mediapipe/hands/' + f
});
hands.setOptions({
  maxNumHands: 10,
  modelComplexity: 1,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5,
});
hands.onResults(onResults);

// ================================================================
//  カメラ起動
// ================================================================
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
    });
    videoEl.srcObject = stream;
    videoEl.onloadedmetadata = () => {
      noCameraEl.style.display = 'none';
      const cam = new Camera(videoEl, {
        onFrame: async () => { await hands.send({ image: videoEl }); },
        width: 1280, height: 720
      });
      cam.start();
      hudStatus.textContent = 'トラッキング中';
    };
  } catch (err) {
    console.error(err);
    noCameraEl.querySelector('p').textContent = 'カメラへのアクセスが拒否されました';
    hudStatus.textContent = 'カメラエラー';
  }
}

startCamera();
fetchConfig();
setInterval(fetchConfig, FETCH_INTERVAL);
</script>
</body>
</html>
