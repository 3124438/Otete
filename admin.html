<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gesture Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e1a; --surface: #111827; --card: #1a2035;
      --border: rgba(255,255,255,.08); --accent: #00d4ff; --accent2: #7b8cde;
      --danger: #ff4d6d; --success: #00e5a0;
      --text: #fff; --muted: rgba(255,255,255,.45); --input-bg: rgba(255,255,255,.05);
    }
    body { background: var(--bg); font-family: 'Space Grotesk', sans-serif; color: var(--text); min-height: 100vh; padding-bottom: 60px; }

    /* Header */
    header {
      background: linear-gradient(135deg,#0d1224,#111827);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-size: 14px; font-weight: 700; }
    .logo-sub  { font-size: 11px; color: var(--muted); letter-spacing: .07em; text-transform: uppercase; }
    .live-dot  { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 7px var(--success); animation: blink 2s infinite; }
    .dot.err { background: var(--danger); box-shadow: 0 0 7px var(--danger); animation: none; }
    .dot.idle{ background: var(--muted); box-shadow: none; animation: none; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* Layout */
    .main { max-width: 900px; margin: 0 auto; padding: 24px 16px 0; display: flex; flex-direction: column; gap: 16px; }

    /* Card */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .card-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title-row { display: flex; align-items: center; gap: 9px; }
    .card-icon {
      width: 26px; height: 26px; border-radius: 7px;
      background: rgba(0,212,255,.12); display: flex; align-items: center; justify-content: center;
    }
    .card-title { font-size: 12px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--accent); }
    .card-body  { padding: 18px; }

    /* GAS URL form */
    .gas-form { display: flex; gap: 10px; }
    .gas-form input {
      flex: 1; background: var(--input-bg); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font-family: inherit;
      font-size: 13px; padding: 9px 13px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .gas-form input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,.1); }
    .btn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 9px; color: #0a0e1a;
      font-family: inherit; font-size: 13px; font-weight: 700;
      padding: 9px 18px; cursor: pointer; white-space: nowrap;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }
    .btn-sm {
      background: rgba(255,255,255,.07); border: 1px solid var(--border);
      color: var(--text); font-size: 12px; padding: 6px 12px;
      border-radius: 7px; cursor: pointer; font-family: inherit; font-weight: 500;
      transition: border-color .2s, background .2s;
    }
    .btn-sm:hover { border-color: var(--accent); background: rgba(0,212,255,.08); color: var(--accent); }

    /* Skeleton toggle */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-label { font-size: 14px; font-weight: 500; }
    .toggle-desc  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .toggle { position: relative; width: 42px; height: 23px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider {
      position: absolute; inset: 0; background: rgba(255,255,255,.1);
      border-radius: 999px; cursor: pointer; transition: background .25s;
    }
    .toggle-slider::after {
      content: ''; position: absolute; width: 17px; height: 17px;
      border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: transform .25s;
    }
    .toggle input:checked + .toggle-slider { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .toggle input:checked + .toggle-slider::after { transform: translateX(19px); }

    /* Table */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left; padding: 8px 10px;
      font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    tbody tr { transition: background .15s; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
    tbody tr.disabled-row { opacity: .4; }
    tbody td { padding: 10px 10px; border-bottom: 1px solid rgba(255,255,255,.04); vertical-align: middle; }

    .img-preview {
      width: 36px; height: 36px; border-radius: 6px; object-fit: cover;
      background: rgba(255,255,255,.06); border: 1px solid var(--border);
      vertical-align: middle;
    }
    .img-url-cell { font-size: 11px; color: var(--muted); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .hand-badge {
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
      letter-spacing: .04em;
    }
    .hand-badge.both   { background: rgba(123,140,222,.18); color: var(--accent2); }
    .hand-badge.right  { background: rgba(0,212,255,.14); color: var(--accent); }
    .hand-badge.left   { background: rgba(0,229,160,.14); color: var(--success); }

    .finger-chips { display: flex; gap: 4px; flex-wrap: wrap; }
    .chip {
      font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px;
      letter-spacing: .04em; text-transform: uppercase; white-space: nowrap;
    }
    .chip.extended { background: rgba(0,212,255,.18); color: var(--accent); }
    .chip.bent     { background: rgba(255,77,109,.18); color: var(--danger); }
    .chip.ignore   { background: rgba(255,255,255,.07); color: var(--muted); }

    .dur-cell { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
    .dur-unit { font-size: 11px; color: var(--muted); font-weight: 400; }

    /* Custom checkbox */
    .cb-wrap { display: flex; justify-content: center; align-items: center; }
    .cb-custom {
      width: 18px; height: 18px; border-radius: 5px; cursor: pointer;
      border: 1.5px solid var(--border); background: var(--input-bg);
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, background .2s;
      flex-shrink: 0;
    }
    .cb-custom.checked {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
    }
    .cb-custom.checked svg { display: block; }
    .cb-custom svg { display: none; }

    /* Row count badge */
    .badge {
      background: rgba(0,212,255,.12); color: var(--accent);
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
    }

    /* Empty state */
    .empty {
      text-align: center; padding: 40px 20px;
      color: var(--muted); font-size: 13px; line-height: 1.7;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--card); border: 1px solid var(--accent);
      border-radius: 10px; color: var(--accent); font-size: 13px; font-weight: 500;
      padding: 9px 18px; opacity: 0; pointer-events: none; z-index: 999;
      transition: opacity .25s, transform .25s; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    a.open-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--accent); text-decoration: none; font-weight: 500;
      transition: opacity .2s;
    }
    a.open-link:hover { opacity: .7; }

    .last-updated { font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/>
        <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/>
        <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/>
        <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Gesture Admin</div>
      <div class="logo-sub">Spreadsheet Connected</div>
    </div>
  </div>
  <div class="live-dot">
    <div class="dot idle" id="sync-dot"></div>
    <span id="sync-label">未接続</span>
  </div>
</header>

<main class="main">

  <!-- GAS URL設定 -->
  <div class="card">
    <div class="card-header">
      <div class="card-title-row">
        <div class="card-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </div>
        <div class="card-title">GAS エンドポイント</div>
      </div>
      <a class="open-link" href="index.html" target="_blank">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        表示画面を開く
      </a>
    </div>
    <div class="card-body">
      <div class="gas-form">
        <input type="text" id="gas-url-input" placeholder="https://script.google.com/macros/s/..." spellcheck="false">
        <button class="btn" onclick="saveAndFetch()">接続・取得</button>
      </div>
      <div style="margin-top:10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
        <button class="btn-sm" onclick="fetchNow()">↺ 今すぐ更新</button>
        <span class="last-updated" id="last-updated">最終取得: -</span>
      </div>
    </div>
  </div>

  <!-- 骨格表示設定 -->
  <div class="card">
    <div class="card-header">
      <div class="card-title-row">
        <div class="card-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </div>
        <div class="card-title">表示設定</div>
      </div>
    </div>
    <div class="card-body">
      <div class="toggle-row">
        <div>
          <div class="toggle-label">骨格（スケルトン）表示</div>
          <div class="toggle-desc">MediaPipeのランドマーク＆接続線を表示する</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="show-skeleton" onchange="broadcastConfig()">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- ジェスチャーテーブル -->
  <div class="card">
    <div class="card-header">
      <div class="card-title-row">
        <div class="card-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </div>
        <div class="card-title">ジェスチャー設定 <span class="badge" id="row-count">0</span></div>
      </div>
      <span class="last-updated" id="sheet-hint">スプレッドシートから読み込み</span>
    </div>
    <div class="card-body" style="padding:0">
      <div class="table-wrap">
        <table id="gesture-table">
          <thead>
            <tr>
              <th style="width:36px">有効</th>
              <th>プレビュー</th>
              <th>画像 URL</th>
              <th>維持時間</th>
              <th>対象の手</th>
              <th>親指</th>
              <th>人差し</th>
              <th>中指</th>
              <th>薬指</th>
              <th>小指</th>
            </tr>
          </thead>
          <tbody id="gesture-tbody">
            <tr><td colspan="10" class="empty">GASのURLを入力して「接続・取得」を押してください</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</main>

<div id="toast"></div>

<script>
// ================================================================
//  状態
// ================================================================
const LS_KEY_URL = 'gas_url';
let gasUrl   = localStorage.getItem(LS_KEY_URL) || '';
let allGestures = [];   // 取得した全行（enabled含む）
const channel = new BroadcastChannel('hand-gesture-channel');

// ================================================================
//  初期化
// ================================================================
window.addEventListener('DOMContentLoaded', () => {
  const urlInput = document.getElementById('gas-url-input');
  if (gasUrl) {
    urlInput.value = gasUrl;
    fetchNow();
  }
});

// ================================================================
//  GAS URL保存 → 即取得
// ================================================================
function saveAndFetch() {
  const v = document.getElementById('gas-url-input').value.trim();
  if (!v) { showToast('URLを入力してください'); return; }
  gasUrl = v;
  localStorage.setItem(LS_KEY_URL, gasUrl);
  fetchNow();
}

// ================================================================
//  データ取得
// ================================================================
async function fetchNow() {
  if (!gasUrl) return;
  setDot('idle', '取得中...');
  try {
    const res  = await fetch(gasUrl, { cache: 'no-store' });
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    allGestures = data.gestures || [];
    const showSkeleton = !!data.showSkeleton;

    // 骨格トグルに反映
    document.getElementById('show-skeleton').checked = showSkeleton;

    renderTable(allGestures);
    broadcastConfig();
    setDot('ok', '同期済み');
    document.getElementById('last-updated').textContent =
      '最終取得: ' + new Date().toLocaleTimeString('ja-JP');
    document.getElementById('row-count').textContent = allGestures.length;
  } catch (e) {
    console.error(e);
    setDot('err', 'エラー: ' + e.message.slice(0, 30));
    showToast('取得エラー: ' + e.message.slice(0, 40));
  }
}

// ================================================================
//  テーブル描画
// ================================================================
const FINGER_KEYS = ['thumb','index','middle','ring','pinky'];

function renderTable(gestures) {
  const tbody = document.getElementById('gesture-tbody');
  if (!gestures.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="empty">データがありません</td></tr>';
    return;
  }

  tbody.innerHTML = '';
  gestures.forEach((g, i) => {
    const tr = document.createElement('tr');
    tr.id = 'row-' + i;
    if (!g.enabled) tr.classList.add('disabled-row');

    // チェックボックス
    const tdCb = document.createElement('td');
    const cb   = document.createElement('div');
    cb.className = 'cb-wrap';
    const cbInner = document.createElement('div');
    cbInner.className = 'cb-custom' + (g.enabled ? ' checked' : '');
    cbInner.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
    cbInner.onclick = () => toggleRow(i, g.rowIndex, cbInner, tr);
    cb.appendChild(cbInner);
    tdCb.appendChild(cb);
    tr.appendChild(tdCb);

    // プレビュー
    const tdPrev = document.createElement('td');
    if (g.imageUrl) {
      const img = document.createElement('img');
      img.className = 'img-preview';
      img.src = g.imageUrl;
      img.onerror = () => { img.style.display = 'none'; };
      tdPrev.appendChild(img);
    }
    tr.appendChild(tdPrev);

    // URL
    const tdUrl = document.createElement('td');
    tdUrl.className = 'img-url-cell';
    tdUrl.title = g.imageUrl;
    tdUrl.textContent = g.imageUrl || '-';
    tr.appendChild(tdUrl);

    // 維持時間
    const tdDur = document.createElement('td');
    tdDur.className = 'dur-cell';
    tdDur.innerHTML = g.duration + ' <span class="dur-unit">秒</span>';
    tr.appendChild(tdDur);

    // 対象の手
    const tdHand = document.createElement('td');
    const hClass = g.targetHand === 'Right' ? 'right' : g.targetHand === 'Left' ? 'left' : 'both';
    const hLabel = g.targetHand === 'Right' ? '右手' : g.targetHand === 'Left' ? '左手' : '両手';
    tdHand.innerHTML = `<span class="hand-badge ${hClass}">${hLabel}</span>`;
    tr.appendChild(tdHand);

    // 各指
    FINGER_KEYS.forEach(fk => {
      const td  = document.createElement('td');
      const val = g.fingers[fk];
      const cls = val === 'Extended' ? 'extended' : val === 'Bent' ? 'bent' : 'ignore';
      const lbl = val === 'Extended' ? '伸' : val === 'Bent' ? '曲' : '－';
      td.innerHTML = `<span class="chip ${cls}">${lbl}</span>`;
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

// ================================================================
//  チェックボックストグル → GASに書き戻し
// ================================================================
async function toggleRow(localIdx, rowIndex, cbEl, trEl) {
  const g      = allGestures[localIdx];
  const newVal = !g.enabled;
  g.enabled    = newVal;

  // UI即時反映
  cbEl.classList.toggle('checked', newVal);
  trEl.classList.toggle('disabled-row', !newVal);

  broadcastConfig();

  // GASに書き戻し（rowIndexが存在する場合）
  if (gasUrl && rowIndex) {
    try {
      const url = gasUrl + '?action=toggle&row=' + rowIndex + '&enabled=' + newVal;
      const res = await fetch(url, { cache: 'no-store' });
      const d   = await res.json();
      if (d.success) {
        showToast((newVal ? '有効化' : '無効化') + 'しました (行 ' + rowIndex + ')');
      }
    } catch (e) {
      console.error('toggle write error:', e);
      showToast('書き戻しエラー: ' + e.message.slice(0, 30));
    }
  }
}

// ================================================================
//  BroadcastChannel で表示画面に送信
// ================================================================
function broadcastConfig() {
  // showSkeleton はスプシのJ2から取得した値（トグルのchecked状態をそのまま使う）
  const showSkeleton = document.getElementById('show-skeleton').checked;
  channel.postMessage({
    type: 'config',
    payload: {
      showSkeleton,
      gestures: allGestures
    }
  });
}



// ================================================================
//  UI helpers
// ================================================================
function setDot(state, label) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'dot ' + (state === 'ok' ? '' : state);
  lbl.textContent = label;
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
